# ============================================================
# .github/workflows/ci.yml
#
# Top-level orchestrator pipeline.
#
# Responsibilities:
#   1. Runs backend and frontend CI checks in parallel.
#   2. Enforces an all-green gate on the `main` branch before merging.
#   3. Triggers the deployment workflow (ci_deploy.yml) only after
#      every check passes — implements Google's "green build" rule:
#      no code lands on main without a passing CI.
#
# Architecture:
#
#   push / PR
#       │
#       ├─── ci_backend.yml  (lint → security → django-tests → fastapi-tests)
#       │
#       └─── ci_frontend.yml (lint → unit-tests → build → e2e-tests)
#                                               │
#                                               ▼
#                                      all-checks-passed
#                                               │
#                                     (push to main only)
#                                               │
#                                               ▼
#                                       ci_deploy.yml
#                                    (staging → production)
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Single job that waits for both reusable workflows to pass.
  # Using `needs` with the workflow_run event is not possible for
  # the same push; instead we use a required-status-check matrix
  # approach: list both workflows as required checks in branch
  # protection rules, and this job acts as the single merge gate.

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    # This job acts as a single merge-gate required status check.
    # Branch protection rule should require: "All Checks Passed".
    # The actual test jobs are defined in ci_backend.yml and ci_frontend.yml
    # and are triggered independently on the same push event.
    # This job just reports a combined green status for branch protection.
    steps:
      - name: All checks passed
        run: echo "Backend and Frontend CI workflows must be set as required status checks in branch protection rules."
